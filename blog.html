<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Aibouko's blog - Thoughts on game dev, web development, and art."
    />
    <title>Blog | Aibouko</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet" />
    <style>
      .blog-panel {
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem;
      }
      
      .blog-list {
        display: flex;
        flex-direction: column;
        gap: 2rem;
      }
      
      .blog-card {
        background: #fff;
        border: 2px solid var(--border-color);
        position: relative;
        overflow: hidden;
      }
      
      .blog-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: var(--accent-lavender);
      }
      
      .blog-header {
        padding: 1.5rem;
        border-bottom: 1px solid var(--border-light);
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }
      
      .blog-title-group h3 {
        margin: 0;
        font-size: 1.5rem;
        color: var(--text-primary);
        font-family: 'Cormorant Garamond', serif;
      }
      
      .blog-title-group .jp-text {
        display: block;
        font-size: 0.9rem;
        color: var(--text-secondary);
        margin-top: 0.25rem;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      
      .blog-card:hover .jp-text {
        opacity: 1;
      }
      
      .blog-meta {
        text-align: right;
        font-size: 0.85rem;
      }
      
      .blog-date {
        color: var(--text-secondary);
        display: block;
      }
      
      .blog-category {
        display: inline-block;
        background: var(--accent-lavender);
        color: #fff;
        padding: 0.2rem 0.6rem;
        border-radius: 3px;
        font-size: 0.75rem;
        margin-top: 0.5rem;
      }
      
      .blog-content {
        padding: 1.5rem;
      }
      
      .blog-quote {
        font-family: 'Noto Sans JP', sans-serif;
        font-size: 1.1rem;
        color: var(--text-secondary);
        margin: 0 0 1rem 0;
        padding-left: 1rem;
        border-left: 3px solid var(--accent-lavender);
        font-style: italic;
      }
      
      .blog-excerpt {
        line-height: 1.8;
        color: var(--text-primary);
      }
      
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--text-secondary);
        text-decoration: none;
        margin-bottom: 2rem;
        transition: color 0.2s ease;
      }
      
      .back-link:hover {
        color: var(--accent-lavender);
      }
      
      .back-arrow {
        font-size: 1.2rem;
      }
      
      @media (max-width: 600px) {
        .blog-panel {
          padding: 1rem;
        }
        
        .blog-header {
          flex-direction: column;
          gap: 1rem;
        }
        
        .blog-meta {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <main class="manga-page">
      <section class="blog-section manga-chapter" aria-labelledby="blog-heading">
        <div class="chapter-header">
          <span class="chapter-number">BLOG</span>
          <span class="chapter-title">Development Notes</span>
        </div>
        
        <div class="blog-panel manga-panel">
          <a href="index.html" class="back-link" aria-label="Back to portfolio">
            <span class="back-arrow">←</span>
            <span>Back to Portfolio</span>
          </a>
          
          <div class="blog-list" id="blog-container">
            <!-- Blog posts populated by JavaScript -->
          </div>
        </div>
      </section>
    </main>

    <footer class="manga-footer">
      <div class="footer-content">
        <span class="end-mark">― おわり ―</span>
        <p class="copyright">&copy; 2026 Aibouko</p>
      </div>
    </footer>

    <script>
      (function() {
        'use strict';
        
        // XSS Protection: Escape HTML to prevent injection attacks
        function escapeHtml(unsafe) {
          if (typeof unsafe !== 'string') return unsafe;
          return unsafe
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
        }
        
        function formatDate(dateStr) {
          const date = new Date(dateStr);
          return date.toLocaleDateString('en-US', { 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric' 
          });
        }
        
        function renderBlog(blogData) {
          const container = document.getElementById('blog-container');
          if (!container) return;
          
          if (!blogData || blogData.length === 0) {
            container.innerHTML = '<p style="text-align: center; color: var(--text-secondary);">No blog posts yet. Add some in data.json!</p>';
            return;
          }
          
          container.innerHTML = blogData.map(post => `
            <article class="blog-card">
              <div class="blog-header">
                <div class="blog-title-group">
                  <h3>【${escapeHtml(post.title)}】</h3>
                  <span class="jp-text" aria-hidden="true">${escapeHtml(post.jpTitle)}</span>
                </div>
                <div class="blog-meta">
                  <span class="blog-date">${formatDate(post.date)}</span>
                  <span class="blog-category">${escapeHtml(post.category)}</span>
                </div>
              </div>
              
              <div class="blog-content">
                <p class="blog-quote">「${escapeHtml(post.quote)}」</p>
                <p class="blog-excerpt">${escapeHtml(post.content)}</p>
              </div>
            </article>
          `).join('');
        }
        
        async function loadBlog() {
          try {
            const response = await fetch('data.json');
            if (!response.ok) throw new Error('Failed to load data');
            const data = await response.json();
            renderBlog(data.blog);
          } catch (error) {
            console.error('Could not load blog data:', error);
            const container = document.getElementById('blog-container');
            if (container) {
              container.innerHTML = '<p style="text-align: center; color: var(--text-secondary);">Could not load blog posts. Please check that data.json exists and is valid.</p>';
            }
          }
        }
        
        // Initialize
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', loadBlog);
        } else {
          loadBlog();
        }
      })();
    </script>
  </body>
</html>
