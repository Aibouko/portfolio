<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Atip's blog - Thoughts on game dev, web development, and art."
    />
    <title>Blog | Atip</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=M+PLUS+Rounded+1c:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet" />
    <style>
      .blog-panel {
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem;
      }
      
      .blog-list {
        display: flex;
        flex-direction: column;
        gap: 2rem;
      }
      
      /* BLOG CARD TEMPLATE - Copy this block for new blog posts */
      /*
      <article class="blog-card">
        <a href="blog/blog-post-XX.html" class="blog-card-link">
          <div class="blog-header">
            <div class="blog-title-group">
              <h3>【Post Title】</h3>
            </div>
            <div class="blog-meta">
              <span class="blog-date">Month DD, YYYY</span>
              <span class="blog-category">Category</span>
            </div>
          </div>
          
          <div class="blog-content">
            <p class="blog-quote">「Your Quote」</p>
            <p class="blog-excerpt">Excerpt or preview...</p>
          </div>
        </a>
      </article>
      */
      
      .blog-card {
        background: #fff;
        border: 2px solid var(--panel-border);
        position: relative;
        overflow: hidden;
        transition: all 0.3s ease;
      }
      
      .blog-card:hover {
        border-color: var(--accent-lavender);
        box-shadow: 0 8px 24px rgba(184, 169, 201, 0.15);
        transform: translateY(-3px);
      }
      
      .blog-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: var(--accent-lavender);
      }
      
      .blog-card-link {
        display: block;
        text-decoration: none;
        color: inherit;
      }
      
      .blog-header {
        padding: 1.5rem;
        border-bottom: 1px solid var(--panel-border);
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }
      
      .blog-title-group h3 {
        margin: 0;
        font-size: 1.5rem;
        color: var(--text-primary);
        font-family: 'Cormorant Garamond', serif;
      }
      
      .blog-title-group .jp-text {
        display: block;
        font-size: 0.9rem;
        color: var(--text-secondary);
        margin-top: 0.25rem;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      
      .blog-card:hover .jp-text {
        opacity: 1;
      }
      
      .blog-meta {
        text-align: right;
        font-size: 0.85rem;
      }
      
      .blog-date {
        color: var(--text-secondary);
        display: block;
      }
      
      .blog-category {
        display: inline-block;
        background: var(--accent-lavender);
        color: #fff;
        padding: 0.2rem 0.6rem;
        border-radius: 3px;
        font-size: 0.75rem;
        margin-top: 0.5rem;
      }
      
      .blog-content {
        padding: 1.5rem;
      }
      
      .blog-quote {
        font-family: 'Noto Sans JP', sans-serif;
        font-size: 1.1rem;
        color: var(--text-secondary);
        margin: 0 0 1rem 0;
        padding-left: 1rem;
        border-left: 3px solid var(--accent-lavender);
        font-style: italic;
      }
      
      .blog-excerpt {
        line-height: 1.8;
        color: var(--text-primary);
      }
      
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--text-secondary);
        text-decoration: none;
        margin-bottom: 2rem;
        transition: color 0.2s ease;
      }
      
      .back-link:hover {
        color: var(--accent-lavender);
      }
      
      @media (max-width: 600px) {
        .blog-panel {
          padding: 1rem;
        }
        
        .blog-header {
          flex-direction: column;
          gap: 1rem;
        }
        
        .blog-meta {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <main class="manga-page">
      <section class="blog-section manga-chapter" aria-labelledby="blog-heading">
        <header class="chapter-header">
          <span class="chapter-number">BLOG</span>
          <span class="chapter-title">Development Notes</span>
        </header>
        
        <div class="blog-panel manga-panel">
          <a href="index.html" class="back-link" aria-label="Back to portfolio">
            <span class="back-arrow">←</span>
            <span>Back to Portfolio</span>
          </a>
          
          <div class="blog-list">
            <!-- My Neovim Config (March 28, 2026) -->
            <article class="blog-card">
              <a href="blog/my-neovim-config.html" class="blog-card-link">
                <div class="blog-header">
                  <div class="blog-title-group">
                    <h3>【My Neovim Config】</h3>
                    <span class="jp-text" aria-hidden="true">単一ファイルの設定</span>
                  </div>
                  <div class="blog-meta">
                    <span class="blog-date">March 28, 2026</span>
                    <span class="blog-category">Dev Tools</span>
                  </div>
                </div>
                
                <div class="blog-content">
                  <p class="blog-quote">「Simple and Easy. Mine」</p>
                  <p class="blog-excerpt">My simple Neovim config. One file. init.lua. 261 lines. Clean, does everything I need...</p>
                </div>
              </a>
            </article>
          </div>
        </div>
      </section>
    </main>

    <footer class="manga-footer">
      <div class="footer-content">
        <span class="end-mark">― おわり ―</span>
        <p class="copyright">&copy; 2026 Atip</p>
      </div>
    </footer>
  </body>
</html>
