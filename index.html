<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Aibouko - Game & web developer. View portfolio of Godot projects and web development work."
    />
    <title>Aibouko</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <main class="manga-page">
      <!-- Hero Section -->
      <section class="hero manga-chapter" aria-labelledby="site-title">
        <div class="chapter-header">
          <span class="chapter-number">CH. 00</span>
          <span class="chapter-title">Character Profile</span>
        </div>
        
        <div class="hero-panels">
          <!-- Profile Panel -->
          <div class="manga-panel panel-profile">
            <div class="panel-header">
              <span class="panel-label">Profile</span>
            </div>
            <div class="panel-content">
              <div class="profile-card">
                <div class="profile-name">
                  <h1 id="site-title"></h1>
                  <span class="jp-text" aria-hidden="true"></span>
                </div>
                <p class="tagline"></p>
                
                <div class="profile-stats">
                  <!-- Populated by JavaScript -->
                </div>
                
                <div class="action-buttons">
                  <a href="#" target="_blank" rel="noopener noreferrer" class="choice-btn" aria-label="View GitHub profile">
                    <span class="btn-text">GitHub</span>
                  </a>
                  <a href="#" class="choice-btn" aria-label="Send email">
                    <span class="btn-text">Email</span>
                  </a>
                </div>
              </div>
            </div>
          </div>
          
          <!-- Skills Panel -->
          <div class="manga-panel panel-skills">
            <div class="panel-header">
              <span class="panel-label">Skill Tree</span>
            </div>
            <div class="panel-content">
              <div class="skill-tree">
                <div class="tree-center">
                  <span class="center-node"></span>
                </div>
                <div class="tree-branches-horizontal">
                  <div class="branch-left">
                    <div class="branch-connector left-connector"></div>
                    <div class="branch-node">
                      <span class="branch-title">Game</span>
                      <div class="skills-group"></div>
                    </div>
                  </div>
                  <div class="branch-right">
                    <div class="branch-connector right-connector"></div>
                    <div class="branch-node">
                      <span class="branch-title">Web</span>
                      <div class="skills-group"></div>
                    </div>
                  </div>
                </div>
                <div class="tree-branches-vertical">
                  <div class="branch-down">
                    <div class="branch-connector down-connector"></div>
                    <div class="branch-node">
                      <span class="branch-title">Tools</span>
                      <div class="skills-group"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        
        <button class="continue-btn" onclick="scrollToProjects()" aria-label="Continue to projects">
          <span class="continue-text-en">▼ Continue</span>
          <span class="continue-text-jp" aria-hidden="true">▼ 続く</span>
        </button>
      </section>

      <div class="page-break" aria-hidden="true"></div>

      <!-- Projects Section -->
      <section id="projects" class="projects manga-chapter" aria-labelledby="projects-heading">
        <div class="chapter-header">
          <span class="chapter-number">CH. 01-02</span>
          <span class="chapter-title">Projects</span>
        </div>
        
        <div class="project-scenes">
          <!-- Projects populated by JavaScript -->
        </div>
      </section>
    </main>

    <footer class="manga-footer">
      <div class="footer-content">
        <span class="end-mark">― 完 ―</span>
        <p class="copyright">&copy; 2026 Aibouko</p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
