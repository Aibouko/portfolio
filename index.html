<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Aibouko - Game and Website Developer Portfolio"
    />
    <meta name="author" content="Aibouko" />

    <meta property="og:title" content="Aibouko | Developer" />
    <meta property="og:description" content="I build games and websites" />
    <meta property="og:type" content="website" />

    <title>Aibouko | Game & Web Developer</title>

    <link rel="stylesheet" href="css/style.css" />

    <script>
      (function () {
        const saved = localStorage.getItem("theme");
        const system = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;
        document.documentElement.setAttribute(
          "data-theme",
          saved || (system ? "dark" : "light"),
        );
      })();
    </script>
  </head>

  <body>
    <!-- Background -->
    <div class="bg-grid" aria-hidden="true"></div>

    <!-- Hero -->
    <header class="hero">
      <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme">
        <svg
          id="sun-icon"
          class="icon hidden"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="12" cy="12" r="5" />
          <path
            d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
          />
        </svg>
        <svg
          id="moon-icon"
          class="icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
        </svg>
      </button>

      <h1>Aibouko</h1>
      <p>I build <strong>games</strong> and <strong>websites</strong></p>
      <a href="mailto:pitava@proton.me">Contact me</a>
    </header>

    <!-- Projects -->
    <section class="projects">
      <h2>Projects</h2>

      <div class="grid">
        <article class="card">
          <div class="card-image">
            <img src="./assets/gesturedrawing.png" alt="Gesture Drawing App" />
          </div>

          <h3>Gesture Drawing App</h3>

          <div class="tags muted">
            <span>Windows</span>
            <span>•</span>
            <span>Linux</span>
          </div>

          <div class="tags">
            <span>Godot</span>
            <span>•</span>
            <span>GDScript</span>
          </div>

          <a href="https://github.com/Aibouko/Gesture-Drawing-App">GitHub</a>
        </article>
      </div>
    </section>

    <script src="js/main.js"></script>
  </body>
</html>
